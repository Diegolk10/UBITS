<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubits · Dashboard Comercial Chile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ubits-blue: #0C1A8C;
  --ubits-blue-mid: #1430B8;
  --ubits-blue-light: #E8ECFF;
  --ubits-blue-dark: #07104F;
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface2: #F2F1EE;
  --border: rgba(0,0,0,0.08);
  --border-md: rgba(0,0,0,0.13);
  --text-primary: #1A1915;
  --text-secondary: #6B6860;
  --text-muted: #A09D97;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --blue: #185FA5;
  --blue-light: #E6F1FB;
  --amber: #854F0B;
  --amber-light: #FAEEDA;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --teal: #0F6E56;
  --teal-light: #E1F5EE;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── SETUP SCREEN ── */
#setup-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  background: linear-gradient(145deg, var(--ubits-blue-dark) 0%, var(--ubits-blue-mid) 60%, #2650E8 100%);
}

.setup-wrap { width: 100%; max-width: 420px; }

.setup-logo {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 2.5rem;
}

.setup-logo img { height: 48px; }

.setup-logo-text h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; color: white; }
.setup-logo-text p { font-size: 13px; color: rgba(255,255,255,0.6); }

.setup-card {
  background: rgba(255,255,255,0.97);
  border-radius: var(--radius-xl);
  padding: 2rem;
  box-shadow: 0 20px 60px rgba(7,16,79,0.35);
}

.setup-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
.setup-card > p { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem; }

.field-label {
  font-size: 12px; font-weight: 500; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block;
}

.api-input {
  width: 100%; padding: 11px 14px; font-size: 13px;
  font-family: 'DM Mono', monospace;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text-primary);
  transition: border-color 0.15s; letter-spacing: 0.02em;
}
.api-input:focus { outline: none; border-color: var(--ubits-blue); background: var(--surface); }

.input-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; align-items: center; gap: 4px; }

.connect-btn {
  width: 100%; margin-top: 1.25rem; padding: 12px;
  font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  background: var(--ubits-blue); color: white; border: none;
  border-radius: var(--radius-md); cursor: pointer;
  transition: opacity 0.15s, transform 0.1s; letter-spacing: -0.1px;
}
.connect-btn:hover { opacity: 0.9; }
.connect-btn:active { transform: scale(0.99); }
.connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.setup-divider {
  text-align: center; margin: 1rem 0; font-size: 12px; color: var(--text-muted); position: relative;
}
.setup-divider::before, .setup-divider::after {
  content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border);
}
.setup-divider::before { left: 0; }
.setup-divider::after { right: 0; }

.demo-btn {
  width: 100%; padding: 11px; font-size: 13px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; background: transparent;
  color: var(--text-secondary); border: 1px solid var(--border-md);
  border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s;
}
.demo-btn:hover { background: var(--surface2); color: var(--text-primary); }

.error-msg {
  font-size: 12px; color: var(--red); margin-top: 10px;
  padding: 8px 12px; background: var(--red-light);
  border-radius: var(--radius-sm); display: none;
}

/* ── APP ── */
#app { display: none; min-height: 100vh; }

.topbar {
  background: linear-gradient(135deg, var(--ubits-blue-dark) 0%, var(--ubits-blue-mid) 100%);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(7,16,79,0.25);
}

.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo-img { height: 26px; }

.topbar-country {
  font-size: 11px; background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85); padding: 2px 9px;
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

.week-badge {
  font-size: 12px; color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.12); padding: 4px 10px;
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
}

.demo-pill {
  font-size: 11px; background: var(--amber-light); color: var(--amber);
  padding: 3px 10px; border-radius: 20px; font-weight: 500; display: none;
}

.icon-btn {
  width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.1); border-radius: var(--radius-sm);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.8); font-size: 14px; transition: background 0.12s;
}
.icon-btn:hover { background: rgba(255,255,255,0.2); color: white; }

/* ── NAV TABS ── */
.nav-tabs {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; gap: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.nav-tab {
  font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  padding: 12px 16px; border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s; letter-spacing: -0.1px;
}
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active { color: var(--ubits-blue); border-bottom-color: var(--ubits-blue); }

/* ── CONTENT ── */
.page { display: none; padding: 20px; }
.page.active { display: block; }

/* ── KPI CARDS ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px; margin-bottom: 20px;
}

.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-sm);
}

.kpi-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px; font-size: 14px;
}

.kpi-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
.kpi-value { font-size: 24px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.5px; line-height: 1.1; }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ── TWO COL ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.full-col { margin-bottom: 14px; }

/* ── SECTION ── */
.section-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden;
}

.section-head {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.section-head-left { display: flex; align-items: center; gap: 8px; }
.section-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.section-title { font-size: 13px; font-weight: 600; letter-spacing: -0.1px; }
.section-count { font-size: 11px; color: var(--text-muted); background: var(--surface2); padding: 1px 7px; border-radius: 20px; border: 1px solid var(--border); }

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 9px 14px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); }
.data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover td { background: #FAFAF8; }

/* ── BADGES ── */
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; margin-right: 3px; }
.badge-sql { background: var(--blue-light); color: var(--blue); }
.badge-opportunity { background: var(--green-light); color: var(--green); }
.badge-upside { background: var(--amber-light); color: var(--amber); }
.badge-forecast { background: var(--purple-light); color: var(--purple); }
.badge-in { background: #E1F5EE; color: #085041; }
.badge-lost { background: var(--red-light); color: var(--red); }
.badge-demo { background: var(--purple-light); color: var(--purple); }
.badge-followup { background: var(--blue-light); color: var(--blue); }
.badge-growth { background: var(--teal-light); color: var(--teal); }
.badge-llamada { background: var(--surface2); color: var(--text-secondary); }
.badge-presencial { background: #E8ECFF; color: var(--ubits-blue); border: 1px solid rgba(12,26,140,0.2); }

/* ── OWNER CHIP ── */
.owner-chip { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; }
.av-0 { background: var(--blue-light); color: var(--blue); }
.av-1 { background: var(--green-light); color: var(--green); }
.av-2 { background: var(--purple-light); color: var(--purple); }
.av-3 { background: var(--amber-light); color: var(--amber); }
.av-4 { background: var(--teal-light); color: var(--teal); }

/* ── AE CARDS ── */
.ae-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
.ae-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm); }
.ae-card:hover { border-color: var(--ubits-blue); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.ae-card.selected { border-color: var(--ubits-blue); border-width: 2px; }
.ae-avatar-lg { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.ae-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.1px; }
.ae-stat-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.ae-stat-val { font-weight: 500; color: var(--text-secondary); }
.ae-card-leader { border-color: var(--ubits-blue) !important; position: relative; }
.ae-leader-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; font-weight: 600; background: var(--ubits-blue-light); color: var(--ubits-blue); padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
.ae-group { margin-bottom: 24px; }
.ae-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.ae-group-role { font-size: 11px; font-weight: 600; color: var(--ubits-blue); text-transform: uppercase; letter-spacing: 0.08em; }

/* ── MEETING ROWS ── */
.meeting-item { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 10px; transition: background 0.1s; }
.meeting-item:last-child { border-bottom: none; }
.meeting-item:hover { background: #FAFAF8; }
.meeting-presencial { background: #F0F3FF !important; border-left: 3px solid var(--ubits-blue); }
.meeting-presencial:hover { background: #E8ECFF !important; }

.meeting-date-block { width: 42px; text-align: center; flex-shrink: 0; }
.meeting-date-day { font-size: 18px; font-weight: 600; line-height: 1; letter-spacing: -0.5px; color: var(--text-primary); }
.pres-day { color: var(--ubits-blue) !important; }
.meeting-date-mon { font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.06em; }
.meeting-divider { width: 1px; height: 32px; background: var(--border-md); flex-shrink: 0; }
.meeting-info { flex: 1; min-width: 0; }
.meeting-company { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meeting-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.meeting-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

/* ── INDUSTRY BARS ── */
.ind-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.ind-row:last-child { border-bottom: none; }
.ind-label { font-size: 12px; color: var(--text-secondary); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ind-bar-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.ind-bar-fill { height: 100%; background: var(--ubits-blue); border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.ind-pct { font-size: 11px; color: var(--text-muted); width: 32px; text-align: right; font-family: 'DM Mono', monospace; }

/* ── BACK BTN ── */
.back-row { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.back-btn { font-size: 13px; color: var(--text-secondary); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 4px 0; font-family: 'DM Sans', sans-serif; transition: color 0.12s; }
.back-btn:hover { color: var(--ubits-blue); }
.rep-header-name { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; }

/* ── PIPELINE SUMMARY ── */
.pipeline-row { display: flex; gap: 8px; padding: 12px 14px; flex-wrap: wrap; }
.pipeline-chip { display: flex; flex-direction: column; align-items: center; padding: 8px 12px; border-radius: var(--radius-md); border: 1px solid var(--border); min-width: 70px; flex: 1; }
.pipeline-chip-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; margin-bottom: 4px; }
.pipeline-chip-count { font-size: 20px; font-weight: 600; line-height: 1; }
.pipeline-chip-val { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

/* ── LOADING ── */
.loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; color: var(--text-secondary); font-size: 13px; gap: 12px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border-md); border-top-color: var(--ubits-blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 2rem; font-size: 13px; color: var(--text-muted); }

/* ── SECTION GROUP LABEL ── */
.section-group-label {
  font-size: 11px; font-weight: 600; color: var(--ubits-blue);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 4px 0 8px; display: flex; align-items: center; gap: 6px;
  margin-bottom: 0;
}
.section-group-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }

@media (max-width: 640px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .two-col { grid-template-columns: 1fr; }
  .ae-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function weekRange(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0, 0, 0, 0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  sun.setHours(23, 59, 59, 999);
  return { start: mon, end: sun };
}

function fmtWeek(offset = 0) {
  const { start, end } = weekRange(offset);
  const opts = { day: 'numeric', month: 'short' };
  return start.toLocaleDateString('es-CL', opts) + ' – ' + end.toLocaleDateString('es-CL', opts);
}

function fmtCLP(v) {
  if (!v && v !== 0) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  if (n === 0) return '$0';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'K';
  return '$' + Math.round(n).toLocaleString('es-CL');
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts) : new Date(ts);
  return d.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtDateShort(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return { day: d.getDate(), mon: d.toLocaleDateString('es-CL', { month: 'short' }) };
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function ownerColor(name) {
  if (OWNER_COLOR[name] === undefined) {
    const idx = Object.keys(OWNER_COLOR).length % 5;
    OWNER_COLOR[name] = idx;
  }
  return OWNER_COLOR[name];
}

const STAGE_MAP = {
  sql: 'SQL',
  opportunity: 'Opportunity',
  qualifiedtobuy: 'Opportunity',
  upside: 'Upside',
  forecast: 'Forecast',
  closedwon: 'In',
  closedlost: 'Lost',
  contractsent: 'Forecast',
  presentationscheduled: 'Opportunity',
  decisionmakerboughtin: 'Forecast',
  perceptionanalysis: 'Upside',
  appointmentscheduled: 'SQL',
};

function stageLabel(s) {
  if (!s) return '—';
  return STAGE_MAP[s.toLowerCase()] || s;
}

function stageBadge(s) {
  const l = stageLabel(s);
  const cls = { 'SQL': 'badge-sql', 'Opportunity': 'badge-opportunity', 'Upside': 'badge-upside', 'Forecast': 'badge-forecast', 'In': 'badge-in', 'Lost': 'badge-lost' };
  return `<span class="badge ${cls[l] || 'badge-llamada'}">${l}</span>`;
}

function meetingTypeLabel(t) {
  if (!t) return 'Reunión';
  const l = t.toLowerCase();
  if (l.includes('presentac') || l.includes('demo')) return 'Demo';
  if (l.includes('follow')) return 'Follow-up';
  if (l.includes('growth')) return 'Growth';
  if (l.includes('llamada')) return 'Llamada';
  return t;
}

function isPresencial(t) {
  if (!t) return false;
  return t.toLowerCase().includes('presencial');
}

function meetingBadge(t) {
  const l = meetingTypeLabel(t);
  const pres = isPresencial(t);
  const cls = { 'Demo': 'badge-demo', 'Follow-up': 'badge-followup', 'Growth': 'badge-growth', 'Llamada': 'badge-llamada' };
  const presTag = pres ? '<span class="badge badge-presencial">Presencial</span>' : '';
  return `${presTag}<span class="badge ${cls[l] || 'badge-llamada'}">${l}</span>`;
}

function ownerName(id) {
  return ALL_OWNERS[id] || ALL_OWNERS[String(id)] || 'Sin asignar';
}

function dealProp(deal, key) {
  return deal.properties?.[key] || deal.properties?.[key + '__c'] || deal[key] || '';
}

async function connectProxy() {
  const url = document.getElementById('proxy-url-input').value.trim();
  if (!url) return;
  PROXY_URL = url.replace(/\/$/, '');
  const btn = document.getElementById('connect-btn');
  const err = document.getElementById('setup-error');
  btn.disabled = true;
  btn.textContent = 'Conectando...';
  err.style.display = 'none';
  try {
    const r = await fetch(PROXY_URL + '?path=ping');
    if (!r.ok) throw new Error('No se pudo conectar al proxy (HTTP ' + r.status + ')');
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    localStorage.setItem('ubits_proxy_url', PROXY_URL);
    IS_DEMO = false;
    showApp();
    await loadAllData();
    renderAll();
  } catch (e) {
    err.textContent = e.message || 'Error de conexión. Verifica la URL del proxy.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Conectar →';
  }
}

async function connectHS() { await connectProxy(); }

function disconnect() {
  PROXY_URL = '';
  localStorage.removeItem('ubits_proxy_url');
  IS_DEMO = false;
  ALL_DEALS = [];
  ALL_OWNERS = {};
  ALL_MEETINGS = [];
  OWNER_COLOR = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('api-key-input').value = '';
  document.getElementById('connect-btn').disabled = false;
  document.getElementById('connect-btn').textContent = 'Conectar →';
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('week-badge').textContent = fmtWeek(0);
  document.getElementById('demo-pill').style.display = IS_DEMO ? 'inline-block' : 'none';
}

async function refreshData() {
  if (IS_DEMO) return;
  document.getElementById('loading-equipo').style.display = 'flex';
  document.getElementById('content-equipo').style.display = 'none';
  await loadAllData();
  renderAll();
}

async function proxyGet(path) {
  const r = await fetch(PROXY_URL + '?path=' + path);
  if (!r.ok) throw new Error('Proxy error ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadOwners() {
  const d = await proxyGet('owners');
  ALL_OWNERS = {};
  (d.results || []).forEach(o => {
    if (isChileTeam(o.id)) {
      ALL_OWNERS[o.id] = (o.firstName + ' ' + o.lastName).trim();
    }
  });
}

async function loadDeals() {
  const d = await proxyGet('deals');
  ALL_DEALS = (d.results || []).filter(deal => {
    const ownerId = deal.properties?.hubspot_owner_id;
    return ownerId && ALL_OWNERS[ownerId];
  });
}

async function loadMeetings() {
  const d = await proxyGet('meetings');
  ALL_MEETINGS = (d.results || []).filter(m => {
    const ownerId = m.properties?.hubspot_owner_id;
    return ownerId && ALL_OWNERS[ownerId];
  });
}

async function loadAllData() {
  await Promise.all([loadOwners(), loadDeals(), loadMeetings()]);
}

          </div>
        </div>
        ${indSorted.map(([ind, cnt]) => `
          <div class="ind-row">
            <div class="ind-label">${ind}</div>
            <div class="ind-bar-track"><div class="ind-bar-fill" style="width:${Math.round(cnt/indMax*100)}%"></div></div>
            <div class="ind-pct">${cnt}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('content-equipo').innerHTML = html;
}

function meetingRow(m) {
  const ts = parseInt(m.properties?.hs_meeting_start_time || 0);
  const { day, mon } = fmtDateShort(ts);
  const title = m.properties?.hs_meeting_title || 'Reunión';
  const type = m.properties?.hs_activity_type;
  const owner = ownerName(m.properties?.hubspot_owner_id);
  const parts = title.split('·');
  const company = parts.length > 1 ? parts[parts.length - 1].trim() : title;
  const pres = isPresencial(type);

  return `
    <div class="meeting-item${pres ? ' meeting-presencial' : ''}">
      <div class="meeting-date-block">
        <div class="meeting-date-day${pres ? ' pres-day' : ''}">${day}</div>
        <div class="meeting-date-mon">${mon}</div>
      </div>
      <div class="meeting-divider"></div>
      <div class="meeting-info">
        <div class="meeting-company">${company}</div>
        <div class="meeting-sub">${owner}</div>
      </div>
      <div class="meeting-right">
        ${meetingBadge(type)}
      </div>
    </div>
  `;
}

function ownerChip(name) {
  const idx = ownerColor(name);
  return `<div class="owner-chip"><div class="avatar av-${idx}">${initials(name)}</div><span style="font-size:12px">${name.split(' ')[0]}</span></div>`;
}

// ── VENDEDORES PAGE ──
function renderVendedores() {
  const ownerIds = Object.keys(ALL_OWNERS);
  const { start: ws, end: we } = weekRange(0);
  const { start: ns, end: ne } = weekRange(1);

  if (selectedOwner) {
    renderRepDetail(selectedOwner);
    return;
  }

  // Build id->name map for Chile only
  const ownerMap = {};
  ownerIds.forEach(id => ownerMap[id] = ALL_OWNERS[id]);

  function aeCard(id) {
    const name = ownerMap[id];
    if (!name) return '';
    const colorIdx = ownerColor(name);
    const myDeals = ALL_DEALS.filter(d => String(dealProp(d,'hubspot_owner_id')) === String(id));
    const thisWeek = myDeals.filter(d => { const cd = new Date(dealProp(d,'createdate')); return cd >= ws && cd <= we; });
    const nextMtgs = ALL_MEETINGS.filter(m => {
      const t = parseInt(m.properties?.hs_meeting_start_time || 0);
      return String(m.properties?.hubspot_owner_id) === String(id) && new Date(t) >= ns && new Date(t) <= ne;
    });
    const pipeline = myDeals
      .filter(d => !['closedwon','closedlost'].includes(dealProp(d,'dealstage')?.toLowerCase()))
      .reduce((s, d) => s + (parseFloat(dealProp(d,'amount')) || 0), 0);
    const leader = isLeader(id);
    return `
      <div class="ae-card${leader ? ' ae-card-leader' : ''}" onclick="selectRep('${id}')">
        ${leader ? '<div class="ae-leader-badge">Líder</div>' : ''}
        <div class="ae-avatar-lg av-${colorIdx}">${initials(name)}</div>
        <div class="ae-name">${name.split(' ').slice(0,2).join(' ')}</div>
        <div class="ae-stat-row"><span>Deals esta semana</span><span class="ae-stat-val">${thisWeek.length}</span></div>
        <div class="ae-stat-row"><span>Reuniones próx.</span><span class="ae-stat-val">${nextMtgs.length}</span></div>
        <div class="ae-stat-row"><span>Pipeline</span><span class="ae-stat-val">${fmtCLP(pipeline)}</span></div>
      </div>
    `;
  }

  // Render grouped by hierarchy
  const groupsHtml = CHILE_HIERARCHY.map(group => {
    const leaderId = ownerIds.find(id => String(id) === String(group.leader));
    const reportIds = group.reports.map(rid => ownerIds.find(id => String(id) === String(rid))).filter(Boolean);
    if (!leaderId && reportIds.length === 0) return '';
    return `
      <div class="ae-group">
        <div class="ae-group-header">
          <span class="ae-group-role">${group.role}</span>
        </div>
        <div class="ae-grid">
          ${leaderId ? aeCard(leaderId) : ''}
          ${reportIds.map(id => aeCard(id)).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Any Chile member not in hierarchy groups
  const groupedIds = new Set(CHILE_HIERARCHY.flatMap(g => [g.leader, ...g.reports]));
  const ungrouped = ownerIds.filter(id => !groupedIds.has(String(id)));
  const ungroupedHtml = ungrouped.length > 0 ? \`
    <div class="ae-group">
      <div class="ae-group-header"><span class="ae-group-role">Equipo</span></div>
      <div class="ae-grid">\${ungrouped.map(id => aeCard(id)).join('')}</div>
    </div>\` : '';

  document.getElementById('content-vendedores').innerHTML = groupsHtml + ungroupedHtml;
}

function selectRep(id) {
  selectedOwner = id;
  renderRepDetail(id);
}

function renderRepDetail(id) {
  const name = ALL_OWNERS[id];
  const idx = ownerColor(name);
  const { start: ws, end: we } = weekRange(0);
  const { start: ns, end: ne } = weekRange(1);

  const myDeals = ALL_DEALS.filter(d => String(dealProp(d,'hubspot_owner_id')) === String(id));
  const activeDeals = myDeals.filter(d => !['closedwon','closedlost'].includes(dealProp(d,'dealstage')?.toLowerCase()));
  const wonDeals = myDeals.filter(d => {
    const s = dealProp(d,'dealstage')?.toLowerCase();
    const mod = new Date(dealProp(d,'hs_lastmodifieddate') || dealProp(d,'closedate'));
    return (s === 'closedwon') && mod >= ws && mod <= we;
  });
  const thisWeekDeals = myDeals.filter(d => {
    const cd = new Date(dealProp(d,'createdate'));
    return cd >= ws && cd <= we;
  });

  const myMeetings = ALL_MEETINGS.filter(m => String(m.properties?.hubspot_owner_id) === String(id));
  const nextMtgs = myMeetings.filter(m => {
    const t = parseInt(m.properties?.hs_meeting_start_time || 0);
    const d = new Date(t);
    return d >= ns && d <= ne;
  }).sort((a,b) => parseInt(a.properties?.hs_meeting_start_time||0) - parseInt(b.properties?.hs_meeting_start_time||0));
  const thisMtgs = myMeetings.filter(m => {
    const t = parseInt(m.properties?.hs_meeting_start_time || 0);
    const d = new Date(t);
    return d >= ws && d <= we;
  });

  const pipeline = activeDeals.reduce((s, d) => s + (parseFloat(dealProp(d,'amount')) || 0), 0);

  const html = `
    <div class="back-row">
      <button class="back-btn" onclick="backToReps()">← Todos los AEs</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div class="ae-avatar-lg av-${idx}" style="width:48px;height:48px;font-size:17px;margin-bottom:0">${initials(name)}</div>
      <div>
        <div class="rep-header-name">${name}</div>
        <div style="font-size:13px;color:var(--text-secondary)">Account Executive · Chile</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Deals esta semana</div>
        <div class="kpi-value">${thisWeekDeals.length}</div>
        <div class="kpi-sub">nuevos</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Ganados esta semana</div>
        <div class="kpi-value">${wonDeals.length}</div>
        <div class="kpi-sub">${fmtCLP(wonDeals.reduce((s,d)=>s+(parseFloat(dealProp(d,'amount'))||0),0))}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Reuniones próx. sem.</div>
        <div class="kpi-value">${nextMtgs.length}</div>
        <div class="kpi-sub">${nextMtgs.filter(m=>meetingTypeLabel(m.properties?.hs_activity_type)==='Demo').length} demos</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Pipeline activo</div>
        <div class="kpi-value">${fmtCLP(pipeline)}</div>
        <div class="kpi-sub">${activeDeals.length} negocios</div>
      </div>
    </div>

    <div class="two-col">
      <div class="section-card">
        <div class="section-head">
          <div class="section-head-left">
            <span class="section-title">Reuniones próxima semana</span>
            <span class="section-count">${nextMtgs.length}</span>
          </div>
        </div>
        ${nextMtgs.length === 0 ? '<div class="empty">Sin reuniones agendadas</div>' :
          nextMtgs.map(m => meetingRow(m)).join('')}
      </div>
      <div class="section-card">
        <div class="section-head">
          <div class="section-head-left">
            <span class="section-title">Reuniones esta semana</span>
            <span class="section-count">${thisMtgs.length}</span>
          </div>
        </div>
        ${thisMtgs.length === 0 ? '<div class="empty">Sin reuniones esta semana</div>' :
          thisMtgs.map(m => meetingRow(m)).join('')}
      </div>
    </div>

    <div class="full-col">
      <div class="section-card">
        <div class="section-head">
          <div class="section-head-left">
            <span class="section-title">Todos los deals activos</span>
            <span class="section-count">${activeDeals.length}</span>
          </div>
        </div>
        ${activeDeals.length === 0 ? '<div class="empty">Sin deals activos</div>' :
          `<div style="overflow-x:auto"><table class="data-table">
            <thead><tr>
              <th>Empresa</th><th>Etapa</th><th>Valor CLP</th><th>Licencias</th><th>Industria</th><th>Cierre est.</th>
            </tr></thead>
            <tbody>
              ${activeDeals.map(d => `
                <tr>
                  <td><strong>${dealProp(d,'dealname')}</strong></td>
                  <td>${stageBadge(dealProp(d,'dealstage'))}</td>
                  <td style="font-family:'DM Mono',monospace;font-size:12px">${fmtCLP(dealProp(d,'amount'))}</td>
                  <td style="font-size:12px;color:var(--text-secondary)">${dealProp(d,'licencias_vendidas') || '—'}</td>
                  <td style="font-size:12px;color:var(--text-secondary)">${dealProp(d,'industria') || dealProp(d,'industry') || '—'}</td>
                  <td style="font-size:12px;color:var(--text-muted)">${dealProp(d,'closedate') ? new Date(dealProp(d,'closedate')).toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'}) : '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table></div>`}
      </div>
    </div>
  `;

  document.getElementById('content-vendedores').innerHTML = html;
}

function backToReps() {
  selectedOwner = null;
  renderVendedores();
}

// ── REUNIONES PAGE ──
function renderReuniones() {
  const { start: ws, end: we } = weekRange(0);
  const { start: ns, end: ne } = weekRange(1);
  const { start: ps, end: pe } = weekRange(-1);

  const past = ALL_MEETINGS.filter(m => {
    const t = parseInt(m.properties?.hs_meeting_start_time || 0);
    const d = new Date(t);
    return d >= ps && d <= pe;
  }).sort((a,b) => parseInt(a.properties?.hs_meeting_start_time||0) - parseInt(b.properties?.hs_meeting_start_time||0));

  const current = ALL_MEETINGS.filter(m => {
    const t = parseInt(m.properties?.hs_meeting_start_time || 0);
    const d = new Date(t);
    return d >= ws && d <= we;
  }).sort((a,b) => parseInt(a.properties?.hs_meeting_start_time||0) - parseInt(b.properties?.hs_meeting_start_time||0));

  const next = ALL_MEETINGS.filter(m => {
    const t = parseInt(m.properties?.hs_meeting_start_time || 0);
    const d = new Date(t);
    return d >= ns && d <= ne;
  }).sort((a,b) => parseInt(a.properties?.hs_meeting_start_time||0) - parseInt(b.properties?.hs_meeting_start_time||0));

  const meetingsTable = (list) => {
    if (list.length === 0) return '<div class="empty">Sin reuniones</div>';
    return list.map(m => {
      const ts = parseInt(m.properties?.hs_meeting_start_time || 0);
      const { day, mon } = fmtDateShort(ts);
      const title = m.properties?.hs_meeting_title || 'Reunión';
      const type = m.properties?.hs_activity_type;
      const owner = ownerName(m.properties?.hubspot_owner_id);
      const parts = title.split('·');
      const company = parts.length > 1 ? parts[parts.length - 1].trim() : title;
      return `
        <div class="meeting-item">
          <div class="meeting-date-block">
            <div class="meeting-date-day">${day}</div>
            <div class="meeting-date-mon">${mon}</div>
          </div>
          <div class="meeting-divider"></div>
          <div class="meeting-info">
            <div class="meeting-company">${company}</div>
            <div class="meeting-sub">${owner}</div>
          </div>
          <div class="meeting-right">
            ${meetingBadge(type)}
          </div>
        </div>
      `;
    }).join('');
  };

  const html = `
    <div class="full-col">
      <div class="section-card">
        <div class="section-head">
          <div class="section-head-left">
            <span class="section-title">Próxima semana</span>
            <span class="section-count">${next.length}</span>
          </div>
          <span style="font-size:11px;color:var(--text-muted)">${fmtWeek(1)}</span>
        </div>
        ${meetingsTable(next)}
      </div>
    </div>
    <div class="two-col">
      <div class="section-card">
        <div class="section-head">
          <div class="section-head-left">
            <span class="section-title">Esta semana</span>
            <span class="section-count">${current.length}</span>
          </div>
          <span style="font-size:11px;color:var(--text-muted)">${fmtWeek(0)}</span>
        </div>
        ${meetingsTable(current)}
      </div>
      <div class="section-card">
        <div class="section-head">
          <div class="section-head-left">
            <span class="section-title">Semana pasada</span>
            <span class="section-count">${past.length}</span>
          </div>
          <span style="font-size:11px;color:var(--text-muted)">${fmtWeek(-1)}</span>
        </div>
        ${meetingsTable(past)}
      </div>
    </div>
  `;

  document.getElementById('content-reuniones').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════
// Auto-load saved proxy URL
window.addEventListener('load', () => {
  const saved = localStorage.getItem('ubits_proxy_url');
  if (saved) {
    const input = document.getElementById('proxy-url-input');
    if (input) input.value = saved;
    PROXY_URL = saved;
    IS_DEMO = false;
    showApp();
    loadAllData().then(renderAll).catch(err => {
      localStorage.removeItem('ubits_proxy_url');
      disconnect();
    });
  }
});

function switchTab(tab) {
  currentTab = tab;
  ['equipo','vendedores','reuniones'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('page-' + t).classList.toggle('active', t === tab);
  });
}
